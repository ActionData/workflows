name: Validate OpenSpec Proposals

on:
  workflow_call:
    inputs:
      changes_dir:
        description: 'Path to OpenSpec changes directory'
        required: false
        type: string
        default: 'openspec/changes'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate OpenSpec proposals
        env:
          CHANGES_DIR: ${{ inputs.changes_dir }}
        run: |
          set -euo pipefail

          ERRORS=0
          CHECKED=0

          # Required sections (## headings) every proposal must have (OpenSpec v1.2.0)
          REQUIRED_SECTIONS=(
            "Why"
            "What Changes"
            "Capabilities"
            "Impact"
          )

          error() {
            echo "::error file=$CURRENT_FILE::$1"
            ERRORS=$((ERRORS + 1))
          }

          warn() {
            echo "::warning file=$CURRENT_FILE::$1"
          }

          validate_proposal() {
            local file="$1"
            local change_name
            change_name=$(basename "$(dirname "$file")")
            CURRENT_FILE="$file"

            echo "Checking $change_name/proposal.md..."

            CHECKED=$((CHECKED + 1))

            # Check title line (# proposal-name)
            if ! head -1 "$file" | grep -qE '^# .+'; then
              error "Missing title. Expected: # proposal-name"
            fi

            # Check required sections
            for section in "${REQUIRED_SECTIONS[@]}"; do
              if ! grep -qE "^## ${section}" "$file"; then
                error "Missing required section: ## ${section}"
              fi
            done

            # Check sections have content (not just heading + blank)
            for section in "${REQUIRED_SECTIONS[@]}"; do
              local section_line
              section_line=$(grep -nE "^## ${section}" "$file" | head -1 | cut -d: -f1 || echo "")
              if [[ -n "$section_line" ]]; then
                local next_content
                next_content=$(tail -n +"$((section_line + 1))" "$file" | grep -m1 -cE '^[^#$].*[^ ]' || echo "0")
                if [[ "$next_content" == "0" ]]; then
                  warn "Section '## ${section}' appears to have no content"
                fi
              fi
            done

            # Check for common convention violations
            if grep -qi 'mcp.*crm\|crm.*mcp' "$file" 2>/dev/null; then
              if ! grep -qi 'sync\|external\|pipedrive\|hubspot\|salesforce' "$file" 2>/dev/null; then
                warn "Possible MCP reference for CRM tools (CRM tools should be native Zig VTable, not MCP)"
              fi
            fi
          }

          echo "=== OpenSpec Proposal Validation ==="
          echo ""

          if [[ ! -d "$CHANGES_DIR" ]]; then
            echo "::error::$CHANGES_DIR directory not found"
            exit 1
          fi

          # Find all proposal.md files in active and archived changes
          mapfile -t proposal_files < <(find "$CHANGES_DIR" -name "proposal.md" | sort)

          if [[ ${#proposal_files[@]} -eq 0 ]]; then
            echo "No proposal files found in $CHANGES_DIR"
            exit 0
          fi

          for file in "${proposal_files[@]}"; do
            validate_proposal "$file"
            echo ""
          done

          echo "=== Results ==="
          echo "Proposals checked: $CHECKED"
          echo "Errors: $ERRORS"

          if [[ $ERRORS -gt 0 ]]; then
            echo ""
            echo "::error::FAILED: $ERRORS error(s) found."
            exit 1
          else
            echo ""
            echo "PASSED: All proposals are valid."
            exit 0
          fi
